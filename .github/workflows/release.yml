name: release

on:
  workflow_dispatch:
    inputs:
      release_id:
        description: Release identifier
        required: true
        default: v0.1.0

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e .[dev]
      - run: python scripts/seed_project.py
      - run: python scripts/import_psalms.py
      - run: python scripts/build_indexes.py
      - run: python scripts/generate_reports.py --release-id "${{ github.event.inputs.release_id }}"
      - run: python -m app.cli export-release "${{ github.event.inputs.release_id }}"
