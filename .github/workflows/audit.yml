name: audit

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e .[dev]
      - run: python scripts/bootstrap_fixture_repo.py
      - run: python -m app.cli audit-licenses
      - run: python scripts/generate_reports.py --release-id audit-dry-run
      - uses: actions/upload-artifact@v4
        with:
          name: audit-reports
          path: reports/
