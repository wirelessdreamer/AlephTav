repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.5
    hooks:
      - id: ruff
      - id: ruff-format
  - repo: local
    hooks:
      - id: validate-content
        name: validate-content
        entry: python scripts/validate_content.py
        language: system
        pass_filenames: false
